<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5a3"/>
      <stop offset="50%" style="stop-color:#b8965a"/>
      <stop offset="100%" style="stop-color:#d4af70"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#f9f4ec"/>
  
  <!-- Outer decorative ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  
  <!-- Heart behind letters -->
  <path d="M50 68 C50 68 22 50 22 38 C22 28 30 22 38 22 C44 22 48 26 50 30 C52 26 56 22 62 22 C70 22 78 28 78 38 C78 50 50 68 50 68 Z" 
        fill="url(#goldGrad)" 
        opacity="0.15"/>
  
  <!-- Letters M & E with ampersand -->
  <text x="50" y="56" 
        font-family="Great Vibes, Cormorant Garamond, serif" 
        font-size="42" 
        font-weight="600"
        fill="url(#goldGrad)" 
        text-anchor="middle"
        filter="url(#softGlow)"
        style="letter-spacing: -2px;">M&amp;E</text>
  
  <!-- Small decorative elements -->
  <circle cx="50" cy="12" r="1.5" fill="url(#goldGrad)"/>
  <circle cx="50" cy="88" r="1.5" fill="url(#goldGrad)"/>
  <circle cx="12" cy="50" r="1.5" fill="url(#goldGrad)"/>
  <circle cx="88" cy="50" r="1.5" fill="url(#goldGrad)"/>
</svg>
